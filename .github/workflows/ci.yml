name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # ─── Backend linting ────────────────────────────────────────────────────────
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linting deps
        run: pip install ruff mypy

      - name: Ruff
        run: ruff check backend/

      - name: Mypy
        run: |
          pip install -r backend/requirements.txt
          mypy backend/app --ignore-missing-imports

  # ─── Backend unit tests ─────────────────────────────────────────────────────
  test-backend:
    name: Unit tests (backend)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/ragdb
      ANTHROPIC_API_KEY: test-key
      OPENAI_API_KEY: test-key
      API_KEY: test-key
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ragdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ─── Frontend type-check + build ────────────────────────────────────────────
  build-frontend:
    name: Build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── Docker build (backend) ─────────────────────────────────────────────────
  build-backend-image:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PRs)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

  # ─── Docker push (main branch only) ─────────────────────────────────────────
  push-images:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-backend-image, build-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./infra/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
